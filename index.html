<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runway</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <!-- Logo -->
      <div class="sb-logo">
        <div class="sb-logo-circle">W</div>
      </div>

      <!-- Main Nav Icons -->
      <nav class="sb-nav-main">
        <button class="sb-icon active" data-nav="overview" title="Overview">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </button>
        <button class="sb-icon" data-nav="projects" title="Projects">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button class="sb-icon" data-nav="reviews" title="Reviews">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <button class="sb-icon" data-nav="trends" title="Trends">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        </button>
        <button class="sb-icon" data-nav="calendar" title="Calendar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </button>
        <button class="sb-icon" data-nav="people" title="My Work">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="mywork-count-badge" id="myWorkBadge"></span>
        </button>
      </nav>

      <!-- Spacer -->
      <div class="sb-spacer"></div>

      <!-- Bottom Utility Icons -->
      <div class="sb-bottom">
        <button class="sb-icon-sm sb-new-task-btn" id="sidebarNewTaskBtn" title="New task">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="sb-icon-sm">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <button class="sb-icon-sm" id="settingsBtn" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1.08-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1.08 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div class="sb-divider"></div>
        <div class="sb-profile" id="profileCard">
          <div class="avatar" id="sidebarAvatar">
            <span id="avatarInitials">MB</span>
          </div>
        </div>
      </div>

      <!-- Hidden elements for JS compat -->
      <span id="profileName" style="display:none">Mike Brisk</span>
      <span id="profileRole" style="display:none">Design Lead</span>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <!-- Top Bar -->
      <header class="topbar">
        <!-- Row 1: Breadcrumb + Title | Search -->
        <div class="topbar-row-1">
          <div class="topbar-row-1-left">
            <button class="icon-btn sidebar-toggle" id="sidebarToggle">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="topbar-title-block">
              <div class="topbar-breadcrumb">
                <span>Workspace</span>
                <span class="breadcrumb-sep">></span>
                <span>Design</span>
                <span class="breadcrumb-sep">></span>
                <span class="breadcrumb-active" id="breadcrumbBoard">Product Design</span>
              </div>
              <div class="topbar-title-row">
                <h1 class="board-title" id="boardTitle">Product Design</h1>
                <button class="title-chevron" id="boardActionsBtn">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="board-actions-dropdown" id="boardActionsDropdown">
                  <div class="dropdown-section-label">Workspaces</div>
                  <button class="context-menu-item workspace-item" id="allWorkspacesBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    All Workspaces
                  </button>
                  <div class="dropdown-divider"></div>
                  <button class="context-menu-item workspace-item active-workspace" data-board="product-design">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Product Design
                  </button>
                  <button class="context-menu-item workspace-item" data-board="business-dev">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    Business Development
                  </button>
                  <button class="context-menu-item workspace-item" data-board="ux">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    UX Research
                  </button>
                  <button class="context-menu-item workspace-item" data-board="flagship">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                    Flagship App
                  </button>
                  <button class="context-menu-item workspace-item" data-board="business-products">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Business Products
                  </button>
                  <div class="dropdown-divider"></div>
                  <button class="context-menu-item" id="saveTemplateBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Save as Template
                  </button>
                  <button class="context-menu-item" id="loadTemplateBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Load Template
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div class="topbar-row-1-right">
            <div class="search-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" placeholder="Search in DesignBoard..." id="searchInput" />
              <svg class="search-filter-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
            </div>
          </div>
        </div>

        <!-- Row 2: View Tabs | Team Avatars -->
        <div class="topbar-row-2">
          <div class="view-switcher">
            <button class="view-tab active" data-view="board">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              Kanban
            </button>
            <button class="view-tab" data-view="list">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              List View
            </button>
            <button class="view-tab" data-view="table">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
              Table
            </button>
            <button class="view-tab" data-view="custom">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
              Custom
            </button>
          </div>
          <div class="topbar-row-2-right">
            <div class="team-avatars">
              <div class="team-avatar" style="background:#f59e0b">MB</div>
            </div>
            <button class="team-add-btn" id="teamAddBtn" title="Invite team member">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>

        <!-- Hidden filter for functionality -->
        <select id="swimlaneFilter" style="display:none">
          <option value="all">All Priorities</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </header>

      <!-- Kanban Board -->
      <div class="board-container" id="boardContainer">
        <!-- Columns injected by JS -->
      </div>

      <!-- Alternate Views Container -->
      <div class="view-container" id="viewContainer" style="display:none">
        <!-- Rendered by views.js -->
      </div>
    </main>

    <!-- Detail Panel -->
    <div class="detail-overlay" id="detailOverlay">
      <div class="detail-panel">
        <div class="detail-header">
          <h2>Task Details</h2>
          <button class="icon-btn" id="closeDetailPanel">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="detail-body" id="detailPanelBody">
          <!-- Rendered by detail-panel.js -->
        </div>
      </div>
    </div>

    <!-- Settings Panel -->
    <div class="settings-overlay" id="settingsOverlay">
      <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
          <h2>Settings</h2>
          <button class="icon-btn" id="closeSettings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="settings-body">
          <div class="settings-section">
            <h3>Profile</h3>
            <div class="settings-field">
              <label>Name</label>
              <input type="text" id="settingsName" value="Mike Brisk" />
            </div>
            <div class="settings-field">
              <label>Role</label>
              <input type="text" id="settingsRole" value="Design Lead" />
            </div>
          </div>
          <div class="settings-section">
            <h3>Appearance</h3>
            <div class="settings-field">
              <label>Theme</label>
              <div class="theme-switcher">
                <button class="theme-option active" data-theme="light">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
                  Light
                </button>
                <button class="theme-option" data-theme="dark">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                  Dark
                </button>
              </div>
            </div>
            <div class="settings-field">
              <label>Accent Color</label>
              <div class="color-options">
                <button class="color-dot active" data-color="#6366f1" style="background:#6366f1"></button>
                <button class="color-dot" data-color="#8b5cf6" style="background:#8b5cf6"></button>
                <button class="color-dot" data-color="#ec4899" style="background:#ec4899"></button>
                <button class="color-dot" data-color="#f59e0b" style="background:#f59e0b"></button>
                <button class="color-dot" data-color="#10b981" style="background:#10b981"></button>
                <button class="color-dot" data-color="#3b82f6" style="background:#3b82f6"></button>
              </div>
            </div>
          </div>
          <div class="settings-section">
            <h3>Board</h3>
            <div class="settings-field">
              <label class="toggle-field">
                <span>Show swimlanes</span>
                <input type="checkbox" id="showSwimlanes" checked />
                <span class="toggle-switch"></span>
              </label>
            </div>
            <div class="settings-field">
              <label class="toggle-field">
                <span>Show WIP indicators</span>
                <input type="checkbox" id="showWip" checked />
                <span class="toggle-switch"></span>
              </label>
            </div>
            <div class="settings-field">
              <label class="toggle-field">
                <span>Compact cards</span>
                <input type="checkbox" id="compactCards" />
                <span class="toggle-switch"></span>
              </label>
            </div>
            <div class="settings-field">
              <label>Aging threshold (days)</label>
              <input type="number" id="agingThreshold" value="5" min="1" max="30" />
            </div>
          </div>
          <div class="settings-section">
            <h3>Columns &amp; WIP Limits</h3>
            <div class="wip-settings" id="wipSettings">
              <!-- Injected by JS -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Team Modal -->
    <div class="settings-overlay" id="teamOverlay">
      <div class="settings-panel" id="teamPanel">
        <div class="settings-header">
          <h2>Team</h2>
          <button class="icon-btn" id="closeTeam">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="settings-body">
          <div class="settings-section">
            <h3>Members</h3>
            <div id="teamMemberList">
              <!-- Injected by team.js -->
            </div>
          </div>
          <div class="settings-section">
            <h3>Invite someone</h3>
            <div class="settings-field">
              <label>Full name</label>
              <input type="text" id="inviteName" placeholder="e.g. Jordan Lee" />
            </div>
            <div class="settings-field">
              <label>Role</label>
              <input type="text" id="inviteRole" placeholder="e.g. UX Designer" />
            </div>
            <button class="btn btn-primary" id="inviteSubmitBtn" style="width:100%;margin-top:8px">Send Invite</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Add Task Modal -->
    <div class="modal-overlay" id="addTaskModal">
      <div class="modal">
        <div class="modal-header">
          <h2>New Task</h2>
          <button class="icon-btn" id="closeModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="modal-field">
            <label>Title</label>
            <input type="text" id="taskTitle" placeholder="Enter task title..." />
          </div>
          <div class="modal-field">
            <label>Description</label>
            <textarea id="taskDesc" placeholder="Brief description..." rows="3"></textarea>
          </div>
          <div class="modal-row">
            <div class="modal-field">
              <label>Priority</label>
              <select id="taskPriority">
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium" selected>Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
            <div class="modal-field">
              <label>Assignee</label>
              <input type="text" id="taskAssignee" placeholder="Name..." />
            </div>
          </div>
          <div class="modal-row">
            <div class="modal-field">
              <label>Type</label>
              <select id="taskType">
                <option value="design">Design</option>
                <option value="research">Research</option>
                <option value="prototype">Prototype</option>
                <option value="review">Review</option>
                <option value="development">Development</option>
              </select>
            </div>
            <div class="modal-field">
              <label>Size</label>
              <select id="taskSize">
                <option value="">None</option>
                <option value="S">S — Small</option>
                <option value="M">M — Medium</option>
                <option value="L">L — Large</option>
                <option value="XL">XL — Extra Large</option>
              </select>
            </div>
          </div>
          <div class="modal-row">
            <div class="modal-field">
              <label>Due Date</label>
              <input type="date" id="taskDue" />
            </div>
          </div>
          <div class="modal-field">
            <label>Epic</label>
            <select id="taskEpic">
              <option value="">None</option>
            </select>
          </div>
          <div class="modal-row">
            <div class="modal-field">
              <label>Requester</label>
              <select id="taskRequester">
                <option value="">None</option>
                <option value="Product Team">Product Team</option>
                <option value="Marketing">Marketing</option>
                <option value="Engineering">Engineering</option>
                <option value="Leadership">Leadership</option>
                <option value="Client Services">Client Services</option>
              </select>
            </div>
            <div class="modal-field">
              <label>Platform</label>
              <select id="taskPlatform">
                <option value="">None</option>
                <option value="Web">Web</option>
                <option value="iOS">iOS</option>
                <option value="Android">Android</option>
                <option value="All Platforms">All Platforms</option>
                <option value="API">API</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="cancelTask">Cancel</button>
